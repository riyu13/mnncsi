<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minna no Nihongo - Kuis Kosakata (dengan Kanji)</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        button {
            cursor: pointer;
            font-family: inherit;
            border: none;
            outline: none;
        }
        input,
        select {
            font-family: inherit;
            outline: none;
            border: none;
        }

        /* ===== CONTAINER ===== */
        .container {
            width: 100%;
            max-width: 960px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 30px 28px 38px;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }

        /* ===== HEADER ===== */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .app-title {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .app-title small {
            font-size: 14px;
            font-weight: 400;
            -webkit-text-fill-color: rgba(255, 255, 255, 0.5);
            margin-left: 6px;
        }
        .user-badge {
            background: rgba(255, 255, 255, 0.10);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .user-badge .role-tag {
            background: rgba(255, 215, 0, 0.20);
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #ffd700;
            letter-spacing: 0.3px;
        }
        .logout-btn {
            background: rgba(255, 70, 70, 0.15);
            color: #ff6b6b;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid rgba(255, 70, 70, 0.15);
        }
        .logout-btn:hover {
            background: rgba(255, 70, 70, 0.25);
        }

        /* ===== LOGIN ===== */
        .login-box {
            max-width: 400px;
            margin: 20px auto 0;
            background: rgba(255, 255, 255, 0.05);
            padding: 36px 32px 42px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .login-box h2 {
            text-align: center;
            font-weight: 600;
            font-size: 24px;
            margin-bottom: 6px;
        }
        .login-box .sub {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 28px;
        }
        .login-box label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }
        .login-box input,
        .login-box select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            transition: 0.2s;
            margin-bottom: 18px;
        }
        .login-box input:focus,
        .login-box select:focus {
            border-color: #ffd700;
            background: rgba(255, 255, 255, 0.10);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.10);
        }
        .login-box select option {
            background: #1a1a2e;
            color: #fff;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            font-weight: 700;
            font-size: 17px;
            border-radius: 16px;
            transition: 0.2s;
            margin-top: 6px;
        }
        .login-btn:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }
        .login-error {
            color: #ff6b6b;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            min-height: 22px;
        }

        /* ===== DASHBOARD ===== */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 18px;
        }
        .dashboard-header h2 {
            font-size: 22px;
            font-weight: 600;
        }
        .dashboard-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .dashboard-controls label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        .dashboard-controls select {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            font-size: 14px;
            min-width: 140px;
        }
        .dashboard-controls select option {
            background: #1a1a2e;
        }
        .access-info {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-left: 6px;
        }

        .exam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin: 16px 0 24px;
        }
        .exam-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            padding: 18px 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
            text-align: center;
            cursor: pointer;
        }
        .exam-card:hover:not(.locked) {
            background: rgba(255, 255, 255, 0.10);
            transform: translateY(-3px);
            border-color: rgba(255, 215, 0, 0.25);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }
        .exam-card.locked {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.6);
        }
        .exam-card .exam-title {
            font-weight: 600;
            font-size: 17px;
            margin-bottom: 4px;
        }
        .exam-card .exam-sub {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        .exam-card .badge-count {
            display: inline-block;
            background: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border-radius: 20px;
            padding: 2px 14px;
            font-size: 12px;
            margin-top: 6px;
        }

        /* ===== VOCAB TABLE ===== */
        .vocab-table-wrap {
            margin-top: 20px;
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.15);
        }
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .vocab-table th {
            text-align: left;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .vocab-table td {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.85);
        }
        .vocab-table tr:last-child td {
            border-bottom: none;
        }
        .vocab-table .ch-cell {
            color: #ffd700;
            font-weight: 600;
            font-size: 13px;
        }
        .vocab-table .kanji-cell {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .vocab-table .hiragana-cell {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.6);
        }
        .vocab-table .romaji-cell {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        /* Table filter dropdown */
        .table-filter {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px 14px 0 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }
        .table-filter label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }
        .table-filter select {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.10);
            font-size: 14px;
            min-width: 120px;
        }
        .table-filter select option {
            background: #1a1a2e;
            color: #fff;
        }
        .table-filter .filter-count {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3);
            margin-left: auto;
        }

        /* ===== QUIZ ===== */
        .quiz-container {
            padding: 6px 0;
        }
        .quiz-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .quiz-top .chapter-label {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
        }
        .quiz-top .chapter-label strong {
            color: #ffd700;
            font-weight: 600;
        }
        .quiz-progress {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
        }
        .timer-box {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.30);
            padding: 6px 18px 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .timer-box .timer-icon {
            font-size: 22px;
        }
        .timer-box .timer-value {
            font-size: 32px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 48px;
            text-align: center;
            transition: color 0.25s;
        }
        .timer-box .timer-value.danger {
            color: #ff6b6b;
        }
        .timer-box .timer-value.warning {
            color: #ffd93d;
        }
        .timer-box .timer-value.safe {
            color: #6bcb77;
        }
        .score-box {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
        }
        .score-box strong {
            color: #fff;
            font-size: 20px;
        }

        .quiz-word {
            text-align: center;
            padding: 30px 10px 18px;
        }
        .word-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .word-display .kanji {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: 4px;
            line-height: 1.2;
        }
        .word-display .hiragana {
            font-size: 22px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
            letter-spacing: 2px;
        }
        .word-display .romaji-hint {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        .question-prompt {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 16px;
            font-weight: 300;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0 24px;
        }
        @media (max-width: 500px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        .option-btn {
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            font-size: 18px;
            font-weight: 500;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.15s;
            text-align: center;
        }
        .option-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 215, 0, 0.20);
            transform: scale(1.01);
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        .option-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .quiz-footer {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            gap: 14px;
        }
        .quit-btn {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
        }
        .quit-btn:hover {
            background: rgba(255, 255, 255, 0.10);
            color: #fff;
        }

        /* ===== GAME OVER ===== */
        .gameover-box {
            text-align: center;
            padding: 30px 10px 20px;
        }
        .gameover-box .big-icon {
            font-size: 70px;
            margin-bottom: 6px;
        }
        .gameover-box h2 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .gameover-box .final-score {
            font-size: 56px;
            font-weight: 800;
            color: #ffd700;
            margin: 10px 0 4px;
        }
        .gameover-box .stats {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
            margin-bottom: 24px;
        }
        .gameover-box .stats span {
            color: #fff;
            font-weight: 600;
        }
        .gameover-actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .gameover-actions button {
            padding: 12px 34px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.2s;
        }
        .btn-retry {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
        }
        .btn-retry:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }
        .btn-dashboard {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .btn-dashboard:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ===== UTILITY ===== */
        .hidden {
            display: none !important;
        }
        .text-center {
            text-align: center;
        }
        .mt-8 {
            margin-top: 8px;
        }
        .mb-8 {
            margin-bottom: 8px;
        }
        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 18px 14px 28px;
                border-radius: 24px;
            }
            .app-title {
                font-size: 20px;
            }
            .app-title small {
                font-size: 12px;
            }
            .exam-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .word-display .kanji {
                font-size: 40px;
            }
            .word-display .hiragana {
                font-size: 18px;
            }
            .timer-box .timer-value {
                font-size: 26px;
                min-width: 38px;
            }
            .option-btn {
                font-size: 16px;
                padding: 14px 10px;
            }
            .gameover-box .final-score {
                font-size: 42px;
            }
            .vocab-table {
                font-size: 12px;
            }
            .vocab-table th,
            .vocab-table td {
                padding: 8px 10px;
            }
            .vocab-table .kanji-cell {
                font-size: 17px;
            }
            .login-box {
                padding: 24px 18px 30px;
            }
            .dashboard-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .table-filter {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .table-filter .filter-count {
                margin-left: 0;
                text-align: center;
            }
        }
        @media (max-width: 400px) {
            .exam-grid {
                grid-template-columns: 1fr 1fr;
            }
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- ===== HEADER ===== -->
        <div class="app-header">
            <div class="app-title">
                📚 みんなの日本語
                <small>Minna no Nihongo</small>
            </div>
            <div class="user-badge" id="userBadge">
                <span id="userNameDisplay">—</span>
                <span class="role-tag" id="roleTagDisplay">—</span>
                <button class="logout-btn" id="logoutBtn">Keluar</button>
            </div>
        </div>

        <!-- ===== LOGIN ===== -->
        <div id="loginSection">
            <div class="login-box">
                <h2>🔑 Masuk</h2>
                <p class="sub">Pilih level dan masukkan password</p>
                <label for="loginLevel">Level</label>
                <select id="loginLevel">
                    <option value="kelas1">Kelas 1</option>
                    <option value="kelas2">Kelas 2</option>
                    <option value="sensei">Sensei</option>
                </select>
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Masukkan password" />
                <button class="login-btn" id="loginBtn">🚀 Masuk</button>
                <div class="login-error" id="loginError"></div>
            </div>
        </div>

        <!-- ===== DASHBOARD ===== -->
        <div id="dashboardSection" class="hidden">
            <div class="dashboard-header">
                <h2>📖 Pilih Ujian</h2>
                <div class="dashboard-controls">
                    <label for="examMode">Mode Ujian</label>
                    <select id="examMode">
                        <option value="perBab">Per Bab</option>
                        <option value="per5Bab">Setiap 5 Bab</option>
                        <option value="per25Bab">Setiap 25 Bab</option>
                    </select>
                    <span class="access-info" id="accessInfo">Akses: Bab 1–25</span>
                </div>
            </div>

            <!-- Exam cards -->
            <div class="exam-grid" id="examGrid"></div>

            <!-- Vocabulary Table with Dropdown Filter -->
            <div class="vocab-table-wrap">
                <div class="table-filter">
                    <label for="babFilter">📂 Filter Bab:</label>
                    <select id="babFilter">
                        <option value="all">📋 Semua Bab</option>
                    </select>
                    <span class="filter-count" id="filterCount">Menampilkan 0 kosakata</span>
                </div>
                <table class="vocab-table" id="vocabTable">
                    <thead>
                        <tr>
                            <th>Bab</th>
                            <th>Kanji</th>
                            <th>Hiragana</th>
                            <th>Arti</th>
                        </tr>
                    </thead>
                    <tbody id="vocabTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== QUIZ ===== -->
        <div id="quizSection" class="hidden">
            <div class="quiz-container">
                <div class="quiz-top">
                    <div>
                        <div class="chapter-label" id="quizLabel">Bab <strong id="quizRange">1</strong></div>
                        <div class="quiz-progress" id="quizProgress">Soal 1 / 10</div>
                    </div>
                    <div class="timer-box">
                        <span class="timer-icon">⏳</span>
                        <span class="timer-value safe" id="timerDisplay">10</span>
                        <span style="font-size:15px;color:rgba(255,255,255,0.3);">dtk</span>
                    </div>
                    <div class="score-box">
                        ✅ <strong id="scoreDisplay">0</strong>
                    </div>
                </div>

                <div class="quiz-word">
                    <div class="word-display">
                        <div class="kanji" id="quizWordKanji"></div>
                        <div class="hiragana" id="quizWordHiragana"></div>
                        <div class="romaji-hint" id="quizWordRomaji" hidden></div>
                    </div>
                    <div class="question-prompt">Pilih arti yang benar</div>
                </div>

                <div class="options-grid" id="optionsGrid">
                    <button class="option-btn" data-index="0">saya</button>
                    <button class="option-btn" data-index="1">kamu</button>
                    <button class="option-btn" data-index="2">dia</button>
                    <button class="option-btn" data-index="3">kita</button>
                </div>

                <div class="quiz-footer">
                    <button class="quit-btn" id="quitQuizBtn">✕ Keluar Kuis</button>
                </div>
            </div>
        </div>

        <!-- ===== GAME OVER ===== -->
        <div id="gameoverSection" class="hidden">
            <div class="gameover-box">
                <div class="big-icon">⏰</div>
                <h2>Waktu Habis!</h2>
                <div class="final-score" id="finalScore">0</div>
                <div style="font-size:18px;color:rgba(255,255,255,0.5);">jawaban benar</div>
                <div class="stats">
                    Ujian: <span id="goRange">Bab 1</span> —
                    Total soal: <span id="goTotal">10</span>
                </div>
                <div class="gameover-actions">
                    <button class="btn-retry" id="retryBtn">🔄 Ulangi</button>
                    <button class="btn-dashboard" id="goDashboardBtn">📋 Kembali</button>
                </div>
            </div>
        </div>

            { bab: 49, jp: 'びょうき', kanji: '病気', romaji: 'byouki', arti: 'sakit' },
            // Bab 50
            { bab: 50, jp: 'しんせつ', kanji: '親切', romaji: 'shinsetsu', arti: 'baik hati' },
            { bab: 50, jp: 'ていねい', kanji: '丁寧', romaji: 'teinei', arti: 'sopan' }
        ];

        // ============================================================
        //  AKUN & PASSWORD
        // ============================================================
        const ACCOUNTS = {
            kelas1: { password: 'kelas1', label: 'Kelas 1', maxBab: 25 },
            kelas2: { password: 'kelas2', label: 'Kelas 2', maxBab: 50 },
            sensei: { password: 'sensei', label: 'Sensei', maxBab: 50 },
        };

        // ============================================================
        //  STATE
        // ============================================================
        let state = {
            user: null,
            currentExam: null,
            filteredBab: 'all', // untuk dropdown filter tabel
        };

        // ============================================================
        //  DOM REFS
        // ============================================================
        const $ = (id) => document.getElementById(id);
        const loginSection = $('loginSection');
        const dashboardSection = $('dashboardSection');
        const quizSection = $('quizSection');
        const gameoverSection = $('gameoverSection');
        const loginLevel = $('loginLevel');
        const loginPassword = $('loginPassword');
        const loginBtn = $('loginBtn');
        const loginError = $('loginError');
        const logoutBtn = $('logoutBtn');
        const userNameDisplay = $('userNameDisplay');
        const roleTagDisplay = $('roleTagDisplay');
        const accessInfo = $('accessInfo');
        const examMode = $('examMode');
        const examGrid = $('examGrid');
        const vocabTableBody = $('vocabTableBody');
        const babFilter = $('babFilter');
        const filterCount = $('filterCount');
        const quizRange = $('quizRange');
        const quizProgress = $('quizProgress');
        const quizWordKanji = $('quizWordKanji');
        const quizWordHiragana = $('quizWordHiragana');
        const quizWordRomaji = $('quizWordRomaji');
        const timerDisplay = $('timerDisplay');
        const scoreDisplay = $('scoreDisplay');
        const optionsGrid = $('optionsGrid');
        const quitQuizBtn = $('quitQuizBtn');
        const finalScore = $('finalScore');
        const goRange = $('goRange');
        const goTotal = $('goTotal');
        const retryBtn = $('retryBtn');
        const goDashboardBtn = $('goDashboardBtn');
        const quizLabel = $('quizLabel');

        // ============================================================
        //  HELPERS
        // ============================================================
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function getRandomWrongOptions(correctArti, excludeBab, count = 3) {
            const pool = VOCAB_DATA.filter(v => v.arti !== correctArti && v.bab !== excludeBab);
            const shuffled = shuffle([...pool]);
            return shuffled.slice(0, count).map(v => v.arti);
        }

        function buildOptions(correctArti, bab) {
            const wrongs = getRandomWrongOptions(correctArti, bab, 3);
            const opts = [
                { text: correctArti, isCorrect: true },
                ...wrongs.map(t => ({ text: t, isCorrect: false })),
            ];
            return shuffle(opts);
        }

        function getVocabByBab(bab) {
            return VOCAB_DATA.filter(v => v.bab === bab);
        }

        function getBabListForMode(mode, maxBab) {
            const allBabs = [];
            for (let b = 1; b <= maxBab; b++) {
                allBabs.push(b);
            }
            if (mode === 'perBab') {
                return allBabs.map(b => [b]);
            } else if (mode === 'per5Bab') {
                const groups = [];
                for (let i = 0; i < allBabs.length; i += 5) {
                    const group = allBabs.slice(i, i + 5);
                    groups.push(group);
                }
                return groups;
            } else if (mode === 'per25Bab') {
                const groups = [];
                for (let i = 0; i < allBabs.length; i += 25) {
                    const group = allBabs.slice(i, i + 25);
                    groups.push(group);
                }
                return groups;
            }
            return [];
        }

        function formatRangeLabel(babList) {
            if (babList.length === 1) return `Bab ${babList[0]}`;
            return `Bab ${babList[0]}–${babList[babList.length - 1]}`;
        }

        function getQuestionsForBabList(babList) {
            let vocab = [];
            babList.forEach(b => {
                const items = getVocabByBab(b);
                vocab = vocab.concat(items);
            });
            return shuffle([...vocab]);
        }

        // ============================================================
        //  RENDER: DASHBOARD
        // ============================================================
        function renderDashboard() {
            if (!state.user) return;
            const maxBab = state.user.maxBab;
            const mode = examMode.value;

            accessInfo.textContent = `Akses: Bab 1–${maxBab}`;

            // Exam cards
            const babGroups = getBabListForMode(mode, maxBab);
            examGrid.innerHTML = '';
            if (babGroups.length === 0) {
                examGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:rgba(255,255,255,0.3);padding:20px;">Tidak ada ujian tersedia</div>';
            } else {
                babGroups.forEach((group) => {
                    const card = document.createElement('div');
                    card.className = 'exam-card';
                    const label = formatRangeLabel(group);
                    card.innerHTML = `
                        <div class="exam-title">${label}</div>
                    `;
                    card.addEventListener('click', () => startQuiz(group));
                    examGrid.appendChild(card);
                });
            }

            // Populate filter dropdown
            const currentFilter = babFilter.value;
            babFilter.innerHTML = '<option value="all">📋 Semua Bab</option>';
            for (let b = 1; b <= maxBab; b++) {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = `Bab ${b}`;
                babFilter.appendChild(opt);
            }
            // Restore previous filter if valid
            if (currentFilter !== 'all' && parseInt(currentFilter) <= maxBab) {
                babFilter.value = currentFilter;
            } else if (currentFilter !== 'all') {
                babFilter.value = 'all';
            }
            state.filteredBab = babFilter.value;

            // Render table with filter
            renderVocabTable();

            userNameDisplay.textContent = state.user.role;
            roleTagDisplay.textContent = state.user.label;
        }

        function renderVocabTable() {
            if (!state.user) return;
            const maxBab = state.user.maxBab;
            const filter = state.filteredBab || 'all';

            let filteredData = VOCAB_DATA.filter(v => v.bab <= maxBab);
            if (filter !== 'all') {
                const babNum = parseInt(filter);
                filteredData = filteredData.filter(v => v.bab === babNum);
            }

            vocabTableBody.innerHTML = '';
            filteredData.forEach(v => {
                const tr = document.createElement('tr');
                const kanjiDisplay = v.kanji || v.jp;
                tr.innerHTML = `
                    <td class="ch-cell">${v.bab}</td>
                    <td class="kanji-cell">${kanjiDisplay}</td>
                    <td class="hiragana-cell">${v.jp}</td>
                    <td>${v.arti}</td>
                `;
                vocabTableBody.appendChild(tr);
            });

            filterCount.textContent = `Menampilkan ${filteredData.length} kosakata`;
        }

        // ============================================================
        //  QUIZ LOGIC
        // ============================================================
        function startQuiz(babList) {
            if (!state.user) return;
            const maxBab = state.user.maxBab;
            if (babList.some(b => b > maxBab)) {
                alert('Anda tidak memiliki akses ke bab tersebut.');
                return;
            }

            if (state.currentExam && state.currentExam.timerId) {
                clearInterval(state.currentExam.timerId);
            }

            const questions = getQuestionsForBabList(babList);
            if (questions.length === 0) {
                alert('Tidak ada kosakata untuk ujian ini.');
                return;
            }

            state.currentExam = {
                mode: examMode.value,
                range: babList,
                questions: questions,
                currentIndex: 0,
                score: 0,
                timeLeft: 10,
                timerId: null,
                isActive: true,
                isAnswering: false,
                totalQuestions: questions.length,
            };

            dashboardSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            gameoverSection.classList.add('hidden');

            quizRange.textContent = formatRangeLabel(babList);
            updateQuizProgress();
            updateTimerDisplay();
            updateScoreDisplay();

            showQuestion();

            if (state.currentExam.timerId) clearInterval(state.currentExam.timerId);
            state.currentExam.timerId = setInterval(() => {
                if (!state.currentExam || !state.currentExam.isActive) return;
                state.currentExam.timeLeft -= 0.1;
                if (state.currentExam.timeLeft <= 0) {
                    state.currentExam.timeLeft = 0;
                    updateTimerDisplay();
                    endQuiz();
                    return;
                }
                updateTimerDisplay();
            }, 100);
        }

        function showQuestion() {
            const exam = state.currentExam;
            if (!exam || !exam.isActive) return;
            const q = exam.questions[exam.currentIndex];
            if (!q) {
                endQuiz();
                return;
            }

            exam.isAnswering = false;

            const kanjiDisplay = q.kanji || q.jp;
            quizWordKanji.textContent = kanjiDisplay;
            quizWordHiragana.textContent = q.jp;
            quizWordRomaji.textContent = q.romaji;

            const opts = buildOptions(q.arti, q.bab);
            exam.currentOptions = opts;

            optionsGrid.innerHTML = '';
            opts.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.dataset.index = idx;
                btn.addEventListener('click', () => handleAnswer(idx));
                optionsGrid.appendChild(btn);
            });

            updateQuizProgress();
        }

        function handleAnswer(index) {
            const exam = state.currentExam;
            if (!exam || !exam.isActive || exam.isAnswering) return;
            exam.isAnswering = true;

            const selected = exam.currentOptions[index];
            if (!selected) {
                exam.isAnswering = false;
                return;
            }

            const isCorrect = selected.isCorrect;
            if (isCorrect) {
                exam.score++;
                exam.timeLeft += 3;
            } else {
                exam.timeLeft -= 1;
                if (exam.timeLeft < 0) exam.timeLeft = 0;
            }

            updateTimerDisplay();
            updateScoreDisplay();

            if (exam.timeLeft <= 0) {
                exam.timeLeft = 0;
                updateTimerDisplay();
                endQuiz();
                return;
            }

            const nextIndex = exam.currentIndex + 1;
            if (nextIndex < exam.questions.length) {
                exam.currentIndex = nextIndex;
                const btns = optionsGrid.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                setTimeout(() => {
                    if (!exam.isActive) return;
                    btns.forEach(b => b.disabled = false);
                    showQuestion();
                }, 150);
            } else {
                const newQuestions = shuffle([...exam.questions]);
                exam.questions = newQuestions;
                exam.currentIndex = 0;
                const btns = optionsGrid.querySelectorAll('.option-btn');
                btns.forEach(b => b.disabled = true);
                setTimeout(() => {
                    if (!exam.isActive) return;
                    btns.forEach(b => b.disabled = false);
                    showQuestion();
                }, 150);
            }
        }

        function updateTimerDisplay() {
            if (!state.currentExam) return;
            const val = Math.ceil(state.currentExam.timeLeft);
            timerDisplay.textContent = val;
            timerDisplay.className = 'timer-value';
            if (val <= 3) timerDisplay.classList.add('danger');
            else if (val <= 6) timerDisplay.classList.add('warning');
            else timerDisplay.classList.add('safe');
        }

        function updateScoreDisplay() {
            if (!state.currentExam) return;
            scoreDisplay.textContent = state.currentExam.score;
        }

        function updateQuizProgress() {
            if (!state.currentExam) return;
            const total = state.currentExam.totalQuestions;
            const current = state.currentExam.currentIndex + 1;
            quizProgress.textContent = `Soal ${current} / ${total}`;
        }

        function endQuiz() {
            const exam = state.currentExam;
            if (!exam) return;
            if (exam.timerId) {
                clearInterval(exam.timerId);
                exam.timerId = null;
            }
            exam.isActive = false;

            quizSection.classList.add('hidden');
            gameoverSection.classList.remove('hidden');
            finalScore.textContent = exam.score;
            goRange.textContent = formatRangeLabel(exam.range);
            goTotal.textContent = exam.totalQuestions;
        }

        // ============================================================
        //  LOGIN / LOGOUT
        // ============================================================
        function handleLogin() {
            const role = loginLevel.value;
            const password = loginPassword.value.trim();
            const account = ACCOUNTS[role];
            if (!account) {
                loginError.textContent = 'Level tidak valid.';
                return;
            }
            if (password !== account.password) {
                loginError.textContent = '❌ Password salah.';
                return;
            }

            loginError.textContent = '';
            state.user = {
                role: role,
                maxBab: account.maxBab,
                label: account.label,
            };

            loginSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            quizSection.classList.add('hidden');
            gameoverSection.classList.add('hidden');

            renderDashboard();
        }

        function handleLogout() {
            if (state.currentExam && state.currentExam.timerId) {
                clearInterval(state.currentExam.timerId);
                state.currentExam.timerId = null;
            }
            state.user = null;
            state.currentExam = null;
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            quizSection.classList.add('hidden');
            gameoverSection.classList.add('hidden');
            loginPassword.value = '';
            loginError.textContent = '';
        }

        function goToDashboard() {
            if (state.currentExam && state.currentExam.timerId) {
                clearInterval(state.currentExam.timerId);
                state.currentExam.timerId = null;
            }
            state.currentExam = null;
            quizSection.classList.add('hidden');
            gameoverSection.classList.add('hidden');
            dashboardSection.classList.remove('hidden');
            renderDashboard();
        }

        function retryQuiz() {
            if (state.currentExam && state.currentExam.range) {
                startQuiz(state.currentExam.range);
            } else {
                goToDashboard();
            }
        }

        // ============================================================
        //  EVENT BINDING
        // ============================================================
        loginBtn.addEventListener('click', handleLogin);
        loginPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
        logoutBtn.addEventListener('click', handleLogout);
        quitQuizBtn.addEventListener('click', goToDashboard);
        retryBtn.addEventListener('click', retryQuiz);
        goDashboardBtn.addEventListener('click', goToDashboard);
        examMode.addEventListener('change', renderDashboard);

        // Filter dropdown event
        babFilter.addEventListener('change', function() {
            state.filteredBab = this.value;
            renderVocabTable();
        });

        document.addEventListener('keydown', (e) => {
            if (!state.currentExam || !state.currentExam.isActive) return;
            const num = parseInt(e.key);
            if (num >= 1 && num <= 4) {
                const btns = optionsGrid.querySelectorAll('.option-btn');
                if (btns[num - 1] && !btns[num - 1].disabled) {
                    btns[num - 1].click();
                }
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        loginSection.classList.remove('hidden');
        dashboardSection.classList.add('hidden');
        quizSection.classList.add('hidden');
        gameoverSection.classList.add('hidden');

        console.log('📚 Minna no Nihongo Kuis Kosakata (2 kata per bab)');
        console.log('🔑 Level: kelas1 (pw:kelas1), kelas2 (pw:kelas2), sensei (pw:sensei)');
        console.log('📖 Mode ujian: Per Bab, Setiap 5 Bab, Setiap 25 Bab');
        console.log('⏱️ 10 detik awal, +2 benar, -1 salah, soal berulang looping');
        console.log('⌨️ Tekan 1-4 untuk jawaban cepat');
        console.log('📂 Gunakan dropdown filter untuk melihat kosakata per bab');
    </script>
</body>
</html>
